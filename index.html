<!DOCTYPE html> 
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6AB023">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="/la-cave/manifest.json">
<title>La Cave – Mon Matériel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --g:#6AB023;--gd:#4E8018;--gl:#8FCC3E;--gg:rgba(106,176,35,0.22);
  --blk:#0F0F0F;--d1:#1A1A1A;--d2:#222;--d3:#2C2C2C;--d4:#383838;
  --tx:#F0F0F0;--tm:#888;--tdim:#555;--yel:#FFD600;--red:#E03030;
  --sh:rgba(0,0,0,0.7);--card:rgba(255,255,255,0.03);--bdr:rgba(106,176,35,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;overflow-x:hidden;overflow-y:auto;}body{overflow:visible;min-height:100%;}
body{font-family:'Barlow',sans-serif;background:var(--blk);color:var(--tx);}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 30% at 50% 0%,rgba(106,176,35,0.1) 0%,transparent 70%);pointer-events:none;z-index:0;}

.hdr{position:sticky;top:0;z-index:200;background:var(--d1);border-bottom:3px solid var(--g);box-shadow:0 3px 20px var(--sh);}
.hdr-top{display:flex;align-items:center;gap:12px;padding:12px 14px 8px;}
.hdr-logo{width:46px;height:46px;background:var(--g);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 18px var(--gg);flex-shrink:0;}
.hdr-tx{flex:1;}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--gl);line-height:1;}
.hdr-sub{font-size:11px;color:var(--tm);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
.hdr-totals{display:flex;gap:14px;}
.htot .n{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;color:var(--g);}
.htot .l{font-size:10px;color:var(--tm);letter-spacing:.5px;}
.hdr-search{padding:0 12px 10px;}
.srch{width:100%;background:var(--d3);border:1.5px solid var(--d4);border-radius:10px;padding:10px 14px;color:var(--tx);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.srch:focus{border-color:var(--g);}
.srch::placeholder{color:var(--tdim);}

.main{padding:10px 10px 100px;position:relative;z-index:1;}

.sec-block{margin-bottom:10px;border-radius:14px;overflow:hidden;border:1.5px solid var(--bdr);box-shadow:0 4px 18px rgba(0,0,0,.5);}
.sec-hdr{display:flex;align-items:center;gap:12px;padding:12px 14px;background:linear-gradient(135deg,var(--d2) 0%,var(--d1) 100%);user-select:none;border-left:4px solid var(--g);}
.sec-hdr-tap{display:flex;align-items:center;gap:12px;flex:1;cursor:pointer;min-width:0;}
.sec-hdr-tap:active{opacity:.8;}
.sec-ico{width:40px;height:40px;background:var(--gd);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 0 10px var(--gg);}
.sec-info{flex:1;min-width:0;}
.sec-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sec-meta{font-size:14px;color:var(--tm);margin-top:2px;}
.sec-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sbadge{background:var(--gd);color:var(--gl);font-family:'Bebas Neue',sans-serif;font-size:15px;padding:3px 10px;border-radius:20px;border:1px solid var(--g);letter-spacing:1px;}
.chev{color:var(--g);font-size:17px;transition:transform .3s cubic-bezier(.4,0,.2,1);}
.chev.open{transform:rotate(180deg);}
.sec-edit-btn{background:none;border:none;color:var(--tm);font-size:18px;cursor:pointer;padding:4px 6px;border-radius:6px;transition:all .18s;flex-shrink:0;}
.sec-edit-btn:active{color:var(--g);}

.sec-body{max-height:0;overflow:hidden;background:var(--d1);transition:max-height .38s cubic-bezier(.4,0,.2,1);}
.sec-body.open{max-height:5000px;}
.sec-body-in{padding:10px 10px 12px;}

.cat-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:10px;}
.cat-row::-webkit-scrollbar{display:none;}
.cat-pill{flex-shrink:0;padding:6px 16px;border-radius:20px;border:1.5px solid var(--d4);background:none;color:var(--tm);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:all .18s;}
.cat-pill.active{background:var(--g);border-color:var(--g);color:var(--blk);}

.add-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:linear-gradient(135deg,var(--gd),var(--g));border:none;border-radius:10px;color:var(--blk);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;margin-bottom:10px;box-shadow:0 3px 14px var(--gg);transition:all .18s;}
.add-btn:active{transform:scale(.97);opacity:.88;}

.empty{text-align:center;padding:28px 20px;color:var(--tdim);}
.empty .eico{font-size:44px;margin-bottom:8px;}
.empty p{font-size:13px;line-height:1.6;}

.item-card{background:var(--card);border:1px solid var(--d4);border-radius:12px;overflow:hidden;margin-bottom:8px;}
.item-card.low-stock{border-color:rgba(224,48,48,.4);}
.item-top{display:flex;align-items:center;padding:10px 12px;gap:10px;}
.item-photo{width:56px;height:56px;border-radius:9px;background:var(--d3);border:1.5px solid var(--d4);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;flex-shrink:0;overflow:hidden;position:relative;}
.item-photo img{width:100%;height:100%;object-fit:cover;border-radius:7px;}
.item-photo .povl{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;opacity:0;font-size:16px;}
.item-photo:active .povl{opacity:1;}
.item-info{flex:1;min-width:0;}
.item-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ib{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-top:3px;letter-spacing:.5px;text-transform:uppercase;}
.ib-out{background:rgba(106,176,35,.18);color:var(--gl);border:1px solid rgba(106,176,35,.3);}
.ib-mat{background:rgba(255,214,0,.12);color:var(--yel);border:1px solid rgba(255,214,0,.25);}
.item-desc{font-size:11px;color:var(--tm);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.ctr-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;}
.ctr-row{display:flex;align-items:center;gap:6px;}
.cbtn{width:34px;height:34px;border-radius:8px;border:none;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .13s;}
.cbtn.m{background:var(--d3);color:var(--red);border:1.5px solid rgba(224,48,48,.3);}
.cbtn.m:active{background:var(--red);color:#fff;transform:scale(.88);}
.cbtn.p{background:var(--d3);color:var(--gl);border:1.5px solid rgba(106,176,35,.3);}
.cbtn.p:active{background:var(--g);color:var(--blk);transform:scale(.88);}
.cval{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;min-width:34px;text-align:center;}
.c-ok{color:var(--gl);}.c-low{color:var(--yel);}.c-zero{color:var(--red);}
.clbl{font-size:9px;color:var(--tdim);letter-spacing:.5px;}

.item-bar{display:flex;border-top:1px solid var(--d3);}
.ibar-btn{flex:1;padding:8px 4px;background:none;border:none;color:var(--tm);font-size:11px;font-family:'Barlow',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-right:1px solid var(--d3);transition:all .18s;}
.ibar-btn:last-child{border-right:none;}
.ibar-btn:active{background:var(--d3);color:var(--g);}
.ibar-ico{font-size:15px;}

.acc-section{border-top:1px solid var(--d3);padding:8px 12px 10px;}
.acc-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--tm);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.acc-add-btn{background:rgba(106,176,35,.15);border:1px solid rgba(106,176,35,.3);color:var(--gl);font-size:11px;padding:3px 10px;border-radius:20px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.5px;}
.acc-add-btn:active{background:var(--g);color:var(--blk);}
.acc-list{display:flex;flex-direction:column;gap:6px;}
.acc-item{display:flex;align-items:center;gap:8px;background:var(--d3);border-radius:8px;padding:8px 10px;border:1px solid var(--d4);}
.acc-name{flex:1;font-size:13px;font-family:'Barlow Condensed',sans-serif;font-weight:600;color:var(--tx);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.acc-type{font-size:10px;color:var(--tm);margin-top:1px;}
.acc-ctr{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.acc-btn{width:26px;height:26px;border-radius:6px;border:none;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .13s;}
.acc-btn.m{background:var(--d2);color:var(--red);border:1px solid rgba(224,48,48,.3);}
.acc-btn.m:active{background:var(--red);color:#fff;}
.acc-btn.p{background:var(--d2);color:var(--gl);border:1px solid rgba(106,176,35,.3);}
.acc-btn.p:active{background:var(--g);color:var(--blk);}
.acc-val{font-family:'Bebas Neue',sans-serif;font-size:20px;min-width:24px;text-align:center;}
.acc-del{background:none;border:none;color:rgba(224,48,48,.5);font-size:14px;cursor:pointer;padding:2px 4px;flex-shrink:0;}
.acc-del:active{color:var(--red);}

.bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--d1);border-top:2px solid var(--g);display:flex;box-shadow:0 -4px 20px var(--sh);}
.nbtn{flex:1;padding:10px 0 8px;background:none;border:none;color:var(--tm);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;letter-spacing:.5px;font-family:'Barlow',sans-serif;cursor:pointer;transition:color .18s;position:relative;}
.nbtn.active{color:var(--g);}
.nbtn .nico{font-size:22px;line-height:1;}

.movl{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.84);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center;}
.movl.open{display:flex;}
.modal{width:100%;max-width:480px;background:var(--d2);border-radius:20px 20px 0 0;border-top:3px solid var(--g);padding:20px 18px 36px;animation:slideUp .3s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
.m-handle{width:40px;height:4px;background:var(--d4);border-radius:2px;margin:-6px auto 18px;}
.m-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--gl);margin-bottom:16px;}
.fg{margin-bottom:14px;}
.flbl{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--tm);margin-bottom:6px;}
.finput,.fsel,.ftxt{width:100%;background:var(--d3);border:1.5px solid var(--d4);border-radius:10px;padding:11px 14px;color:var(--tx);font-family:'Barlow',sans-serif;font-size:15px;outline:none;transition:border-color .2s;}
.finput:focus,.fsel:focus,.ftxt:focus{border-color:var(--g);}
.fsel option{background:var(--d2);color:var(--tx);}
.ftxt{min-height:70px;resize:vertical;}
.stock-row{display:flex;align-items:center;gap:10px;}
.stock-row .finput{flex:1;}
.stock-lbl{font-size:11px;color:var(--tm);flex-shrink:0;white-space:nowrap;}

.cat-sel{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.csbtn{padding:10px 4px;border-radius:10px;border:2px solid var(--d4);background:none;color:var(--tm);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;cursor:pointer;transition:all .18s;text-align:center;}
.csbtn.cs-out.active{background:rgba(106,176,35,.18);border-color:var(--g);color:var(--gl);}
.csbtn.cs-mat.active{background:rgba(255,214,0,.12);border-color:var(--yel);color:var(--yel);}
.csbtn.cs-paint.active{background:rgba(255,100,100,.12);border-color:#FF6464;color:#FF9090;}
.csbtn.cs-elec.active{background:rgba(100,180,255,.12);border-color:#64B4FF;color:#90CCFF;}
.csbtn.cs-plomb.active{background:rgba(100,200,255,.12);border-color:#64C8FF;color:#90D8FF;}
.csbtn.cs-menu.active{background:rgba(180,120,60,.15);border-color:#B4783C;color:#D4A060;}
.csbtn.cs-voiture.active{background:rgba(150,150,255,.15);border-color:#AAAAFF;color:#CCCCFF;}
.csbtn.cs-jardin.active{background:rgba(50,200,100,.15);border-color:#32C864;color:#64E896;}
.csbtn.cs-placo.active{background:rgba(200,180,140,.15);border-color:#C8B48C;color:#E0CC9A;}
.csbtn.cs-papier.active{background:rgba(220,150,220,.15);border-color:#DC96DC;color:#F0B4F0;}
.ib-placo{background:rgba(200,180,140,.12);color:#E0CC9A;border:1px solid rgba(200,180,140,.3);}
.ib-papier{background:rgba(220,150,220,.12);color:#F0B4F0;border:1px solid rgba(220,150,220,.3);}
.ib-paint{background:rgba(255,100,100,.12);color:#FF9090;border:1px solid rgba(255,100,100,.3);}
.ib-elec{background:rgba(100,180,255,.12);color:#90CCFF;border:1px solid rgba(100,180,255,.3);}
.ib-plomb{background:rgba(100,200,255,.12);color:#90D8FF;border:1px solid rgba(100,200,255,.3);}
.ib-menu{background:rgba(180,120,60,.15);color:#D4A060;border:1px solid rgba(180,120,60,.3);}
.ib-voiture{background:rgba(150,150,255,.12);color:#AAAAFF;border:1px solid rgba(150,150,255,.3);}
.ib-jardin{background:rgba(50,200,100,.12);color:#64E896;border:1px solid rgba(50,200,100,.3);}

.achats-view{display:none;padding:10px 10px 100px;position:relative;z-index:1;}
.achats-view.open{display:block;}
.achat-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.achat-card.done{opacity:.5;}
.achat-check{width:28px;height:28px;border-radius:8px;border:2px solid var(--g);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .18s;}
.achat-check.checked{background:var(--g);border-color:var(--g);}
.achat-info{flex:1;min-width:0;}
.achat-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--tx);}
.achat-cat{font-size:11px;color:var(--tm);margin-top:2px;}
.achat-del{background:none;border:none;color:rgba(224,48,48,.5);font-size:18px;cursor:pointer;padding:4px;}
.achat-add-bar{display:flex;gap:8px;margin-bottom:12px;}
.achat-add-bar .finput{flex:1;}
.achat-cat-sel{background:var(--d3);border:1.5px solid var(--d4);border-radius:10px;padding:11px 10px;color:var(--tx);font-family:'Barlow',sans-serif;font-size:13px;outline:none;flex-shrink:0;}
.achat-add-btn2{padding:11px 16px;background:linear-gradient(135deg,var(--gd),var(--g));border:none;border-radius:10px;color:var(--blk);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0;}
.achat-filter-row{display:flex;gap:8px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none;}
.achat-filter-row::-webkit-scrollbar{display:none;}

.mesures-row{display:flex;gap:8px;}
.mesures-row .finput{flex:1;}

.photo-zone{display:flex;flex-direction:column;gap:10px;}
.photo-slot{background:var(--d3);border:2px dashed var(--d4);border-radius:10px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;transition:border-color .2s;}
.photo-slot:active{border-color:var(--g);}
.photo-slot-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:28px;width:100%;height:100%;}
.photo-slot img{width:100%;height:100%;object-fit:cover;border-radius:8px;}
.photo-slot-del-ext{width:100%;padding:5px;background:none;border:1px solid rgba(224,48,48,.3);border-radius:6px;color:var(--red);font-size:11px;cursor:pointer;margin-top:3px;font-family:'Barlow Condensed',sans-serif;font-weight:600;}
.photo-btn-action{flex:1;padding:10px;background:var(--d3);border:1.5px solid var(--d4);border-radius:8px;color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;transition:all .18s;}
.photo-btn-action:active{border-color:var(--g);color:var(--gl);}
.card-photos{display:flex;gap:4px;padding:6px 12px;}
.card-photo-mini{width:52px;height:52px;border-radius:7px;object-fit:cover;cursor:pointer;border:1px solid var(--d4);}

.acc-modal-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.acc-modal-item{display:flex;align-items:center;gap:8px;background:var(--d3);border-radius:8px;padding:8px 10px;}
.acc-modal-name{flex:1;font-size:13px;color:var(--tx);}
.acc-modal-del{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;}
.acc-add-row{display:flex;gap:8px;}
.acc-add-row .finput{flex:2;}
.acc-type-sel{flex:1;background:var(--d3);border:1.5px solid var(--d4);border-radius:10px;padding:11px 8px;color:var(--tx);font-family:'Barlow',sans-serif;font-size:13px;outline:none;}
.acc-add-sub{width:100%;padding:10px;background:rgba(106,176,35,.15);border:1.5px solid rgba(106,176,35,.3);border-radius:8px;color:var(--gl);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;margin-top:6px;}
.acc-add-sub:active{background:var(--g);color:var(--blk);}

.mbtns{display:flex;gap:10px;margin-top:20px;}
.btn-cancel{flex:1;padding:13px;background:var(--d3);border:1.5px solid var(--d4);border-radius:10px;color:var(--tm);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;}
.btn-save{flex:2;padding:13px;background:linear-gradient(135deg,var(--gd),var(--g));border:none;border-radius:10px;color:var(--blk);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;box-shadow:0 3px 14px var(--gg);}
.btn-save:active{opacity:.85;transform:scale(.98);}

.icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:8px;}
.ico-btn{background:var(--d3);border:2px solid var(--d4);border-radius:10px;font-size:22px;padding:8px 0;cursor:pointer;text-align:center;transition:all .18s;}
.ico-btn.active{border-color:var(--g);background:rgba(106,176,35,.18);}
.type-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.type-btn{flex:1;min-width:70px;padding:10px;border-radius:10px;border:2px solid var(--d4);background:none;color:var(--tm);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;cursor:pointer;transition:all .18s;text-align:center;}
.type-btn.active{border-color:var(--g);color:var(--gl);background:rgba(106,176,35,.18);}
.ctr-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.ctr-item{display:flex;align-items:center;gap:10px;background:var(--d3);border:1px solid var(--d4);border-radius:10px;padding:10px 12px;}
.ctr-item-name{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx);}
.ctr-item-cnt{font-size:11px;color:var(--tm);}
.ctr-del-btn{background:none;border:none;color:rgba(224,48,48,.6);font-size:18px;cursor:pointer;padding:4px;}
.btn-add-ctr{width:100%;padding:13px;background:linear-gradient(135deg,var(--gd),var(--g));border:none;border-radius:10px;color:var(--blk);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;margin-top:4px;}
.manage-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:var(--d3);border:1.5px solid var(--d4);border-radius:10px;color:var(--tm);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;margin-top:8px;transition:all .18s;}
.manage-btn:active{border-color:var(--g);color:var(--gl);}

.backup-section{margin-top:8px;display:flex;gap:8px;}
.backup-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;border:none;transition:all .18s;}
.backup-btn.export{background:rgba(106,176,35,.15);border:1.5px solid rgba(106,176,35,.3);color:var(--gl);}
.backup-btn.export:active{background:var(--g);color:var(--blk);}
.backup-btn.import{background:rgba(255,214,0,.1);border:1.5px solid rgba(255,214,0,.3);color:var(--yel);}
.backup-btn.import:active{background:var(--yel);color:var(--blk);}

.save-indicator{position:fixed;top:0;left:0;right:0;z-index:999;background:var(--g);color:var(--blk);text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;padding:6px;transform:translateY(-100%);transition:transform .3s;}
.save-indicator.show{transform:translateY(0);}

.imovl{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.95);align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.imovl.open{display:flex;}
.imovl img{max-width:90vw;max-height:68vh;border-radius:14px;border:2px solid var(--g);}
.im-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--gl);}
.im-close{padding:10px 32px;background:var(--d3);border:1.5px solid var(--d4);border-radius:10px;color:var(--tm);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;}

.stats-view{display:none;padding:10px 10px 100px;position:relative;z-index:1;}
.stats-view.open{display:block;}
.schema-view{display:none;padding:10px 10px 100px;position:relative;z-index:1;}
.schema-view.open{display:block;}
.sch-l1{background:var(--d2);border:2px solid var(--g);border-radius:14px;overflow:hidden;margin-bottom:10px;}
.sch-l1-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;}
.sch-l1-hdr:active{opacity:.8;}
.sch-l1-ico{font-size:24px;flex-shrink:0;}
.sch-l1-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gl);flex:1;}
.sch-l1-count{font-size:11px;color:var(--tm);background:var(--d3);padding:3px 10px;border-radius:20px;flex-shrink:0;}
.sch-chev{color:var(--g);font-size:14px;transition:transform .3s;flex-shrink:0;}
.sch-chev.open{transform:rotate(180deg);}
.sch-l1-body{display:none;padding:0 10px 10px;}
.sch-l1-body.open{display:block;}
.sch-connector{display:flex;gap:0;}
.sch-line{width:2px;background:linear-gradient(180deg,var(--g),transparent);border-radius:2px;margin-right:10px;flex-shrink:0;}
.sch-caisses{flex:1;display:flex;flex-direction:column;gap:8px;}
.sch-l2{background:var(--d3);border:1.5px solid var(--d4);border-radius:10px;overflow:hidden;}
.sch-l2-hdr{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;}
.sch-l2-hdr:active{opacity:.8;}
.sch-l2-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;flex:1;color:var(--tx);}
.sch-l2-count{font-size:11px;color:var(--tm);}
.sch-l2-body{display:none;padding:0 10px 8px;flex-direction:column;gap:5px;}
.sch-l2-body.open{display:flex;}
.sch-l3{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--d2);border-radius:8px;border:1px solid var(--d4);}
.sch-l3-name{font-size:13px;flex:1;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sch-l3-cat{font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(106,176,35,.15);color:var(--gl);border:1px solid rgba(106,176,35,.25);flex-shrink:0;}
.sch-l3-stock{font-size:13px;font-weight:700;color:var(--gl);min-width:24px;text-align:right;flex-shrink:0;}
.sch-empty{text-align:center;padding:10px;color:var(--tdim);font-size:12px;}
.sch-orphans{margin-top:4px;}
.stat-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;margin-bottom:10px;}
.stat-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--tm);margin-bottom:12px;}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--d3);}
.stat-row:last-child{border-bottom:none;}
.stat-label{font-size:14px;color:var(--tx);}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--g);}
.stat-val.red{color:var(--red);}.stat-val.yel{color:var(--yel);}
.progress-bar{height:6px;background:var(--d3);border-radius:3px;margin-top:6px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gd),var(--g));border-radius:3px;}

.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:700;background:var(--gd);color:var(--gl);padding:10px 22px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:.5px;border:1px solid var(--g);box-shadow:0 4px 16px rgba(0,0,0,.5);opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--d4);border-radius:2px;}

#crop-modal{display:none;position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.96);flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:16px;}
</style>
</head>
<body>

<div class="save-indicator" id="save-ind">💾 Sauvegarde...</div>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-logo">🔧</div>
    <div class="hdr-tx">
      <div class="hdr-title">La Cave</div>
      <div class="hdr-sub">Mon Matériel</div>
    </div>
    <div class="hdr-totals">
      <div class="htot"><div class="n" id="total-items">0</div><div class="l">Articles</div></div>
      <div class="htot"><div class="n" id="total-stock">0</div><div class="l">En stock</div></div>
    </div>
  </div>
  <div class="hdr-search">

  </div>
</div>

<div class="main" id="main"></div>
<div class="stats-view" id="stats-view"><div id="stats-content"></div></div>
<div class="achats-view" id="achats-view"><div id="achats-content"></div></div>
<div class="schema-view" id="schema-view"><div id="schema-content"></div></div>

<!-- SOUS-MENU MATÉRIEL -->

  <div style="background:var(--d2);border:1.5px solid var(--g);border-radius:14px;padding:8px;display:flex;flex-direction:column;gap:4px;box-shadow:0 -4px 20px var(--sh);">
    <button class="nav-sub-btn" id="sub-materiel" onclick="setNavSub('Matériel')">📦 Tout Matériel</button>
    <button class="nav-sub-btn" id="sub-peinture" onclick="setNavSub('Peinture')">🎨 Peinture</button>
    <button class="nav-sub-btn" id="sub-elec" onclick="setNavSub('Électricité')">⚡ Électricité</button>
    <button class="nav-sub-btn" id="sub-plomb" onclick="setNavSub('Plomberie')">🔧 Plomberie</button>
    <button class="nav-sub-btn" id="sub-menu" onclick="setNavSub('Menuiserie')">🪵 Menuiserie</button>
    <button class="nav-sub-btn" id="sub-voiture" onclick="setNavSub('Voiture')">🚗 Voiture</button>
    <button class="nav-sub-btn" id="sub-jardin" onclick="setNavSub('Jardin')">🪴 Jardin</button>
    <button class="nav-sub-btn" id="sub-placo" onclick="setNavSub('Placo')">🧱 Placo</button>
    <button class="nav-sub-btn" id="sub-papier" onclick="setNavSub('Papier peint')">🖼️ Papier peint</button>
  </div>
</div>

<div class="bnav">
  <button class="nbtn active" id="nav-accueil" onclick="setNav(this,'all')"><span class="nico">🏠</span>Accueil</button>
  <button class="nbtn" id="nav-outillage" onclick="setNav(this,'Outillage')"><span class="nico">🔨</span>Outils</button>
  <button class="nbtn" id="nav-materiel" onclick="toggleMatSubMenu()"><span class="nico">📦</span>Matériel</button>
  <button class="nbtn" id="nav-achats" onclick="setNav(this,'achats')"><span class="nico">🛒</span>Achats</button>
  <button class="nbtn" id="nav-stats" onclick="setNav(this,'stats')"><span class="nico">📊</span>Stats</button>
</div>

<!-- MODAL ARTICLE -->
<div class="movl" id="add-modal">
  <div class="modal">
    <div class="m-handle"></div>
    <div class="m-title" id="m-title">Ajouter un article</div>
    <div class="fg">
      <label class="flbl">Caisse / Meuble</label>
      <select class="fsel" id="f-ctr"></select>
    </div>
    <div class="fg">
      <label class="flbl">Catégorie</label>
      <div class="cat-sel">
        <button class="csbtn cs-out active" id="btn-out" onclick="selCat('Outillage')">🔨 Outillage</button>
        <button class="csbtn cs-mat" id="btn-mat" onclick="selCat('Matériel')">📦 Matériel</button>
        <button class="csbtn cs-paint" id="btn-paint" onclick="selCat('Peinture')">🎨 Peinture</button>
        <button class="csbtn cs-elec" id="btn-elec" onclick="selCat('Électricité')">⚡ Électricité</button>
        <button class="csbtn cs-plomb" id="btn-plomb" onclick="selCat('Plomberie')">🔧 Plomberie</button>
        <button class="csbtn cs-menu" id="btn-menu" onclick="selCat('Menuiserie')">🪵 Menuiserie</button>
        <button class="csbtn cs-voiture" id="btn-voiture" onclick="selCat('Voiture')">🚗 Voiture</button>
        <button class="csbtn cs-jardin" id="btn-jardin" onclick="selCat('Jardin')">🪴 Jardin</button>
        <button class="csbtn cs-placo" id="btn-placo" onclick="selCat('Placo')">🧱 Placo</button>
        <button class="csbtn cs-papier" id="btn-papier" onclick="selCat('Papier peint')">🖼️ Papier peint</button>
      </div>
    </div>
    <div class="fg">
      <label class="flbl">Nom *</label>
      <div id="name-dropdown" style="display:none;background:var(--d3);border:1.5px solid var(--g);border-radius:10px;margin-bottom:4px;max-height:150px;overflow-y:auto;"></div>
      <input class="finput" id="f-name" type="text" placeholder="Tapez pour chercher ou saisissez..." oninput="filterNameDropdown(this.value)" onfocus="showNameDropdownAndScroll()" autocomplete="off">
    </div>
    <div class="fg" id="mesures-section" style="display:none;">
      <label class="flbl">📏 Mesures</label>
      <div class="mesures-row">
        <input class="finput" id="f-longueur" type="number" placeholder="Longueur (cm)">
        <input class="finput" id="f-largeur" type="number" placeholder="Largeur (cm)">
        <input class="finput" id="f-epaisseur" type="number" placeholder="Épais. (cm)">
      </div>
    </div>
    <div class="fg">
      <label class="flbl">Description</label>
      <textarea class="ftxt" id="f-desc" placeholder="Marque, référence, état..."></textarea>
    </div>
    <div class="fg">
      <label class="flbl" id="stock-label">Quantité</label>
      <div class="stock-row">
        <input class="finput" id="f-stock" type="number" min="0" value="1">
        <span class="stock-lbl" id="alert-lbl" style="display:none">Alerte si ≤</span>
        <input class="finput" id="f-min" type="number" min="0" value="1" style="display:none">
      </div>
    </div>
    <div class="fg">
      <label class="flbl">Photos (max 4)</label>
      <div class="photo-zone">
        <input type="file" id="ph-input-0" accept="image/*" style="display:none" onchange="handlePhotoSlot(event,0)">
        <input type="file" id="ph-input-1" accept="image/*" style="display:none" onchange="handlePhotoSlot(event,1)">
        <input type="file" id="ph-input-2" accept="image/*" style="display:none" onchange="handlePhotoSlot(event,2)">
        <input type="file" id="ph-input-3" accept="image/*" style="display:none" onchange="handlePhotoSlot(event,3)">
        <input type="file" id="ph-camera" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoCamera(event)">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
          <label for="ph-input-0" class="photo-slot" id="slot-0"><div class="photo-slot-inner" id="slot-inner-0">📷<div style="font-size:10px;color:var(--tdim);margin-top:4px;">Photo 1</div></div></label>
          <label for="ph-input-1" class="photo-slot" id="slot-1"><div class="photo-slot-inner" id="slot-inner-1">📷<div style="font-size:10px;color:var(--tdim);margin-top:4px;">Photo 2</div></div></label>
          <label for="ph-input-2" class="photo-slot" id="slot-2"><div class="photo-slot-inner" id="slot-inner-2">📷<div style="font-size:10px;color:var(--tdim);margin-top:4px;">Photo 3</div></div></label>
          <label for="ph-input-3" class="photo-slot" id="slot-3"><div class="photo-slot-inner" id="slot-inner-3">📷<div style="font-size:10px;color:var(--tdim);margin-top:4px;">Photo 4</div></div></label>
        </div>
        <div style="display:flex;gap:8px;margin-top:4px;">
          <label for="ph-input-0" class="photo-btn-action" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;">📁 Parcourir</label>
          <label for="ph-camera" class="photo-btn-action" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;">📸 Photo</label>
        </div>
      </div>
    </div>
    <div class="fg" id="acc-section-modal">
      <label class="flbl">🔩 Accessoires / Lames</label>
      <div class="acc-modal-list" id="acc-modal-list"></div>
      <div class="acc-add-row">
        <input class="finput" id="acc-new-name" type="text" placeholder="Lame 24 dents, Foret 8mm...">
        <select class="acc-type-sel" id="acc-new-type">
          <option>Lame</option><option>Foret</option><option>Disque</option>
          <option>Embout</option><option>Accessoire</option><option>Autre</option>
        </select>
      </div>
      <button class="acc-add-sub" onclick="addAccToModal()">＋ Ajouter cet accessoire</button>
    </div>
    <div class="mbtns">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveItem()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL CONTENEURS -->
<div class="movl" id="ctr-modal">
  <div class="modal">
    <div class="m-handle"></div>
    <div class="m-title">Mes Caisses & Meubles</div>
    <div class="ctr-list" id="ctr-list"></div>
    <div style="border-top:1px solid var(--d3);padding-top:14px;margin-top:4px;">
      <div class="m-title" id="ctr-form-title" style="font-size:18px;margin-bottom:12px;">Ajouter</div>
      <div class="fg">
        <label class="flbl">Type</label>
        <div class="type-row" id="type-row">
          <button class="type-btn active" onclick="selType(this,'caisse')">🧰 Caisse</button>
          <button class="type-btn" onclick="selType(this,'meuble')">🗄️ Meuble</button>
          <button class="type-btn" onclick="selType(this,'etagere')">📚 Étagère</button>
          <button class="type-btn" onclick="selType(this,'autre')">📦 Autre</button>
        </div>
      </div>
      <div class="fg">
        <label class="flbl">Nom *</label>
        <input class="finput" id="ctr-name" type="text" placeholder="Caisse orange, Meuble brun...">
      </div>
      <div class="fg" id="ctr-parent-fg">
        <label class="flbl">📦 Contenu dans (optionnel)</label>
        <select class="fsel" id="ctr-parent">
          <option value="">— Aucun meuble parent —</option>
        </select>
      </div>
      <div class="fg">
        <label class="flbl">Icône ou Photo</label>
        <div style="display:flex;gap:8px;margin-bottom:10px;">
          <button id="tab-icon" onclick="switchCtrTab('icon')" style="flex:1;padding:8px;background:var(--g);border:none;border-radius:8px;color:var(--blk);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">🎨 Icône</button>
          <button id="tab-photo" onclick="switchCtrTab('photo')" style="flex:1;padding:8px;background:var(--d3);border:1px solid var(--d4);border-radius:8px;color:var(--tm);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;">📷 Photo</button>
        </div>
        <div id="ctr-icon-section"><div class="icon-grid" id="icon-grid"></div></div>
     <div id="ctr-photo-section" style="display:none;">
  <!-- Photo principale -->
  <div style="margin-bottom:10px;">
    <label class="flbl">Photo principale</label>
    <input type="file" id="ctr-main-input" accept="image/*" style="display:none" onchange="handleCtrMainPhoto(event)">
    <input type="file" id="ctr-main-cam" accept="image/*" capture="environment" style="display:none" onchange="handleCtrMainPhoto(event)">
    <div id="ctr-main-preview" style="background:var(--d3);border:2px dashed var(--d4);border-radius:10px;height:80px;display:flex;align-items:center;justify-content:center;gap:10px;overflow:hidden;">
      <label for="ctr-main-input" style="padding:8px 14px;background:var(--d4);border-radius:8px;cursor:pointer;font-size:13px;color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-weight:600;">📁 Galerie</label>
      <label for="ctr-main-cam" style="padding:8px 14px;background:var(--d4);border-radius:8px;cursor:pointer;font-size:13px;color:var(--tx);font-family:'Barlow Condensed',sans-serif;font-weight:600;">📸 Photo</label>
    </div>
    <button onclick="clearCtrMainPhoto()" style="width:100%;margin-top:4px;padding:5px;background:none;border:1px solid rgba(224,48,48,.3);border-radius:6px;color:var(--red);font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;cursor:pointer;">🗑 Supprimer photo principale</button>
  </div>
  <!-- Slots compartiments (caisse uniquement) -->
  <div id="ctr-slots-section" style="display:none;">
    <label class="flbl">Photos compartiments (A → N)</label>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;" id="ctr-slots-grid"></div>

  </div>


</div>
      <button class="btn-add-ctr" id="ctr-save-btn" onclick="saveCtr()">＋ Ajouter</button>
    </div>
    <div class="mbtns" style="margin-top:14px;">
      <button class="btn-cancel" style="flex:1" onclick="closeCtrModal()">Fermer</button>
    </div>
  </div>
</div>

<<div class="imovl" id="img-modal" onclick="closeImgModal()">
  <img id="im-img" src="" alt="">
  <div class="im-name" id="im-name"></div>
  <div style="display:flex;gap:12px;align-items:center;" onclick="event.stopPropagation()">
    <button id="gal-prev" class="im-close" onclick="galleryIdx=Math.max(0,galleryIdx-1);showGalleryPhoto();">◀</button>

<!-- MODAL ROGNER -->
<div id="crop-modal">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--gl);">✂️ Ajuster la photo</div>
  <div id="crop-container" style="position:relative;width:88vw;height:66vw;max-width:380px;max-height:285px;overflow:hidden;border:2px solid var(--g);border-radius:12px;background:#111;touch-action:none;cursor:move;">
    <canvas id="crop-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;"></canvas>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px;width:88vw;max-width:380px;">
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="color:var(--tm);font-size:12px;width:50px;">🔍 Zoom</span>
      <input type="range" id="crop-zoom" min="10" max="400" value="100" style="flex:1;accent-color:var(--g);" oninput="drawCrop()">
      <span id="crop-zoom-val" style="color:var(--gl);font-size:12px;width:40px;text-align:right;">100%</span>
    </div>

<script>
// ══════════════════════════════════════════════
// INDEXEDDB — stockage principal fiable
// ══════════════════════════════════════════════
const DB_NAME = 'LaCaveDB';
const DB_VER  = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('data')) {
        d.createObjectStore('data', { keyPath: 'key' });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror   = e => reject(e);
  });
}

function dbSet(key, value) {
  return new Promise((resolve, reject) => {
    if (!db) { resolve(); return; }
    const tx  = db.transaction('data', 'readwrite');
    const st  = tx.objectStore('data');
    const req = st.put({ key, value: JSON.stringify(value) });
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e);
  });
}

function dbGet(key) {
  return new Promise((resolve, reject) => {
    if (!db) { resolve(null); return; }
    const tx  = db.transaction('data', 'readonly');
    const st  = tx.objectStore('data');
    const req = st.get(key);
    req.onsuccess = e => {
      const r = e.target.result;
      resolve(r ? JSON.parse(r.value) : null);
    };
    req.onerror = e => reject(e);
  });
}

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const ICONS = {
  caisse:  ['🧰','📦','🟠','🟡','🟤','⬛','🔴','🟢','🔵','🟣','🪣','🗃️'],
  meuble:  ['🗄️','🪑','🛋️','🗂️','📁','🪞','🚪','🛏️','🪜','🧲','🔲','🗳️'],
  etagere: ['📚','📋','🪤','📐','📏','🔩','🪛','🔧','⚙️','🛠️','🗜️','📌'],
  autre:   ['📦','🪣','🧺','🗑️','♻️','🎁','💼','🧳','🪝','🔑','🏷️','📎'],
};

let S = { containers:[], items:[], open:{}, navFilter:'all', achats:[] };
let editId=null, currentPhoto=null, ctrEditId=null, selIcon='🧰', selTypeKey='caisse';
let modalAccs=[];
let saveTimer=null;

// ══════════════════════════════════════════════
// CHARGEMENT — avec récupération depuis localStorage si IndexedDB vide
// ══════════════════════════════════════════════
async function loadState() {
  // NOUVEAU — Restauration depuis Android si cache vidé
  if (window.__androidRestore) {
    try {
      S = Object.assign(S, window.__androidRestore);
      window.__androidRestore = null;
      await openDB();
      await dbSet('state', S);
      toast('✅ Données restaurées depuis Android !');
      render();
      return;
    } catch(e) {}
  }

  // Demande stockage persistant (évite que le navigateur efface les données)
  if (navigator.storage && navigator.storage.persist) {
    navigator.storage.persist().catch(() => {});
  }

  await openDB();

  // 1. Essaie IndexedDB en premier
  let saved = null;
  try { saved = await dbGet('state'); } catch(e) {}

  if (saved && saved.items && saved.items.length > 0) {
    S = Object.assign(S, saved);
  } else {
    // 2. Fallback : essaie localStorage (migration depuis ancienne version)
    const keys = ['cave-v5','cave-backup','cave-v4','cave-v3'];
    for (const k of keys) {
      try {
        const raw = localStorage.getItem(k);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed && parsed.items) {
            S = Object.assign(S, parsed);
            // Migre immédiatement vers IndexedDB
            await dbSet('state', S);
            toast('✅ Données migrées vers le stockage permanent !');
            break;
          }
        }
      } catch(e) {}
    }
  }

  // Valeurs par défaut si toujours vide
  if (!S.containers || !S.containers.length) {
    S.containers = [
      {id:'c1',name:'Caisse 1',icon:'🧰'},
      {id:'c2',name:'Caisse 2',icon:'📦'},
      {id:'m1',name:'Meuble 1',icon:'🗄️'}
    ];
    S.open = {c1:true, c2:true, m1:true};
  }
  if (!S.items)  S.items  = [];
  if (!S.open)   S.open   = {};
  if (!S.achats) S.achats = [];

  render();
}

// ══════════════════════════════════════════════
// PERSISTANCE — sauvegarde SYNCHRONE à chaque modification
// ══════════════════════════════════════════════
let autoSaveTimer = null;

function persist() {
  // 1. IndexedDB (principal, async)
  dbSet('state', S).catch(() => {});
  // 2. localStorage (backup secondaire)
  try {
    const data = JSON.stringify(S);
    localStorage.setItem('cave-v5', data);
    localStorage.setItem('cave-backup', data);
  } catch(e) {}
  showSaveIndicator();
  // 3. Sauvegarde immédiate sur le téléphone
  autoSaveJSON();
}

function autoSaveJSON() {
  try {
    const data = JSON.stringify(S, null, 2);
    const b64  = btoa(unescape(encodeURIComponent(data)));
    const a    = document.createElement('a');
    a.href     = 'data:application/json;base64,' + b64;
    a.download = 'la-cave-data.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch(e) {}
}

// Sauvegarder quand l app passe en arrière-plan
document.addEventListener('visibilitychange', () => {
  if(document.hidden) { autoSaveJSON(); }
});

// Sauvegarder via Capacitor App plugin
window.addEventListener('DOMContentLoaded', () => {
  if(window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
    window.Capacitor.Plugins.App.addListener('appStateChange', (state) => {
      if(!state.isActive) { autoSaveJSON(); }
    });
  }
});

function showSaveIndicator() {
  const el = document.getElementById('save-ind');
  if (!el) return;
  el.classList.add('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => el.classList.remove('show'), 1500);
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function render() {
  if (S.navFilter==='stats') { renderStats(); return; }
  if (S.navFilter==='achats') { renderAchats(); return; }
  document.getElementById('main').style.display='';
  document.getElementById('stats-view').classList.remove('open');
  document.getElementById('achats-view').classList.remove('open');

    const visible=allInC.filter(i=>{
      if (S.navFilter!=='all'&&i.cat!==S.navFilter) return false;
      if (q&&!i.name.toLowerCase().includes(q)&&!(i.desc||'').toLowerCase().includes(q)) return false;
      return true;
    });
    const filterActive = S.navFilter!=='all';
    const searchActive = q.length > 0;
    const isOpen = (filterActive||searchActive) ? true : S.open[c.id]!==false;
    if ((filterActive||searchActive) && visible.length===0) return '';
    const tot=allInC.length;
    const stk=allInC.reduce((a,i)=>a+(i.stock||0),0);

    // Caisses enfants de ce conteneur
    const enfants = S.containers.filter(x=>x.parentId===c.id);

    const indentStyle = isChild ? `margin-left:18px;border-left:3px solid var(--g);padding-left:0;` : '';

    let cHtml = `<div class="sec-block" style="${indentStyle}">
      <div class="sec-hdr">
        <div class="sec-ico" style="overflow:hidden;position:relative;cursor:pointer;" onclick="(function(e){e.stopPropagation();viewCtrPhoto('${c.id}');})(event)">
        ${c.mainPhoto?`<img src="${c.mainPhoto}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">`:(c.photos&&c.photos.length)?`<img src="${c.photos[0]}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">`:c.photo?`<img src="${c.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">`:c.icon}
        </div>
        <div class="sec-hdr-tap" onclick="toggleSec('${c.id}')">
          <div class="sec-info">
            <div class="sec-name">${c.name}</div>
            <div class="sec-meta">${tot} article${tot!==1?'s':''} · stock : ${stk}</div>
          </div>
          <div class="sec-right">
            <span class="sbadge">${tot}</span>
            <span class="chev ${isOpen?'open':''}">▼</span>
          </div>
        </div>
        <button class="sec-edit-btn" onclick="openCtrModal('${c.id}')">✏️</button>
      </div>
      <div class="sec-body ${isOpen?'open':''}">
        <div class="sec-body-in">
          <div class="cat-row">
            <button class="cat-pill active" onclick="localFilter(event,'all','${c.id}')">Tout</button>
            <button class="cat-pill" onclick="localFilter(event,'Outillage','${c.id}')">🔨 Outillage</button>
            <button class="cat-pill" onclick="localFilter(event,'Matériel','${c.id}')">📦 Matériel</button>
            <button class="cat-pill" onclick="localFilter(event,'Peinture','${c.id}')">🎨 Peinture</button>
            <button class="cat-pill" onclick="localFilter(event,'Électricité','${c.id}')">⚡ Électricité</button>
            <button class="cat-pill" onclick="localFilter(event,'Plomberie','${c.id}')">🔧 Plomberie</button>
            <button class="cat-pill" onclick="localFilter(event,'Menuiserie','${c.id}')">🪵 Menuiserie</button>
            <button class="cat-pill" onclick="localFilter(event,'Voiture','${c.id}')">🚗 Voiture</button>
            <button class="cat-pill" onclick="localFilter(event,'Jardin','${c.id}')">🪴 Jardin</button>
            <button class="cat-pill" onclick="localFilter(event,'Placo','${c.id}')">🧱 Placo</button>
            <button class="cat-pill" onclick="localFilter(event,'Papier peint','${c.id}')">🖼️ Papier peint</button>
          </div>
          <button class="add-btn" onclick="openModal('${c.id}')">＋ &nbsp;Ajouter dans ${c.name}</button>
          <div id="list-${c.id}">`;

    if (visible.length===0 && !enfants.length) {
      cHtml+=`<div class="empty"><div class="eico">🛠️</div><p>Aucun article ici.<br>Appuyez sur <b>Ajouter</b>.</p></div>`;
    } else {
      visible.forEach(it=>{ cHtml+=cardHTML(it); });
    }
    cHtml+=`</div></div></div></div>`;

    // Afficher les enfants indentés en dessous
    enfants.forEach(e => { cHtml += renderContainer(e, true); });

    return cHtml;
  }

  // Afficher seulement les conteneurs sans parent au niveau racine
  S.containers.filter(c => !c.parentId).forEach(c => {
    html += renderContainer(c, false);
  });

  html+=`<button class="manage-btn" onclick="openCtrModal(null)">🗂️ &nbsp;Gérer les caisses &amp; meubles</button>`;
  html+=`<div class="backup-section">
    <button class="backup-btn export" onclick="exportData()">💾 Sauvegarder</button>
    <button class="backup-btn import" onclick="document.getElementById('import-input').click()">📂 Restaurer</button>
  </div>`;

  document.getElementById('main').innerHTML=html;
  document.getElementById('total-items').textContent=S.items.length;
  document.getElementById('total-stock').textContent=S.items.reduce((a,i)=>a+(i.stock||0),0);
}

function cardHTML(it) {
  const sc=it.stock===0?'c-zero':(it.stock<=(it.minS||1)?'c-low':'c-ok');
  const cc=it.stock<=(it.minS||1)?'low-stock':'';
  const catClsMap={'Outillage':'ib-out','Matériel':'ib-mat','Peinture':'ib-paint','Électricité':'ib-elec','Plomberie':'ib-plomb','Menuiserie':'ib-menu','Voiture':'ib-voiture','Jardin':'ib-jardin','Placo':'ib-placo','Papier peint':'ib-papier'};
  const cls=catClsMap[it.cat]||'ib-mat';
  const photos=(it.photos&&it.photos.length)?it.photos:(it.photo?[it.photo]:[]);
  const ph=photos.length?`<img src="${photos[0]}" alt=""><div class="povl">🔍</div>`:(it.cat==='Outillage'?'🔨':'📦');
  const accs=it.accessories||[];

  const accHtml = it.cat!=='Outillage' ? '' : `
    <div class="acc-section">
      <div class="acc-title">
        <span>🔩 Accessoires${accs.length>0?' ('+accs.length+')':''}</span>
        <button class="acc-add-btn" onclick="quickAddAcc('${it.id}')">＋ Ajouter</button>

      ${accs.length>0?`<div class="acc-list">${accs.map((a,i)=>`
        <div class="acc-item">

          <button class="acc-del" onclick="delAcc('${it.id}',${i})">🗑</button>
        </div>`).join('')}</div>`:''}

  return `<div class="item-card ${cc}" id="card-${it.id}">
    <div class="item-top">
      <div class="item-photo" onclick="viewPhoto('${it.id}')">${ph}</div>

        <div class="item-name">${it.name}</div>
        <span class="ib ${cls}">${it.cat}</span>
        ${it.desc?`<div class="item-desc">${it.desc}</div>`:''}
        ${it.longueur?`<div class="item-desc">📏 ${it.longueur}×${it.largeur}×${it.epaisseur} cm</div>`:''}
      </div>
     <div class="ctr-wrap">
        <div class="ctr-row">
          ${it.cat !== 'Outillage' ? `<button class="cbtn m" onclick="chgStock('${it.id}',-1)">−</button>` : ''}
          <span class="cval ${sc}" id="cv-${it.id}">${it.stock}</span>
          ${it.cat !== 'Outillage' ? `<button class="cbtn p" onclick="chgStock('${it.id}',1)">+</button>` : ''}
        </div>
        <div class="clbl">${it.cat === 'Outillage' ? 'en cave' : 'en stock'}</div>
      </div>
    </div>
    ${photos.length>1?`<div class="card-photos">${photos.slice(1).map((p,i)=>`<img class="card-photo-mini" src="${p}" onclick="viewPhotoFull('${it.id}',${i+1})">`).join('')}</div>`:''}
    ${accHtml}
    <div class="item-bar">
      <button class="ibar-btn" onclick="useIt('${it.id}')"><span class="ibar-ico">✅</span>Utiliser</button>
      <button class="ibar-btn" onclick="editItem('${it.id}')"><span class="ibar-ico">✏️</span>Modifier</button>
      <button class="ibar-btn" onclick="delItem('${it.id}')"><span class="ibar-ico">🗑️</span>Supprimer</button>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
// ACCESSOIRES
// ══════════════════════════════════════════════
function chgAcc(itemId,idx,d) {
  const it=S.items.find(i=>i.id===itemId); if(!it||!it.accessories) return;
  it.accessories[idx].stock=Math.max(0,(it.accessories[idx].stock||0)+d);
  persist();
  const el=document.getElementById(`av-${itemId}-${idx}`);
  if(el){ const s=it.accessories[idx].stock; el.className='acc-val '+(s===0?'c-zero':s<=1?'c-low':'c-ok'); el.textContent=s; }
  if(it.accessories[idx].stock===0) toast(`⚠️ ${it.accessories[idx].name} — épuisé !`);
}

function delAcc(itemId,idx) {
  const it=S.items.find(i=>i.id===itemId); if(!it) return;
  it.accessories.splice(idx,1); persist(); render();
}

function quickAddAcc(itemId) {
  const name=prompt('Nom de l\'accessoire/lame :'); if(!name||!name.trim()) return;
  const it=S.items.find(i=>i.id===itemId); if(!it) return;
  if(!it.accessories) it.accessories=[];
  it.accessories.push({name:name.trim(),type:'Accessoire',stock:1});
  persist(); render(); toast('✅ Accessoire ajouté');
}

function addAccToModal() {
  const name=document.getElementById('acc-new-name').value.trim();
  const type=document.getElementById('acc-new-type').value;
  if(!name){ toast('⚠️ Saisissez un nom'); return; }
  modalAccs.push({name,type,stock:1});
  document.getElementById('acc-new-name').value='';
  renderModalAccs();
}

function renderModalAccs() {
  const el=document.getElementById('acc-modal-list'); if(!el) return;
  el.innerHTML=modalAccs.map((a,i)=>`
    <div class="acc-modal-item">
      <span>🔩</span>
      <span class="acc-modal-name">${a.name} <span style="color:var(--tm);font-size:11px">(${a.type})</span></span>
      <button class="acc-modal-del" onclick="removeModalAcc(${i})">🗑</button>
    </div>`).join('');
}

function removeModalAcc(i) { modalAccs.splice(i,1); renderModalAccs(); }

// ══════════════════════════════════════════════
// STOCK
// ══════════════════════════════════════════════
function chgStock(id,d) {
  const it=S.items.find(i=>i.id===id); if(!it) return;
  it.stock=Math.max(0,(it.stock||0)+d); persist();
  const el=document.getElementById(`cv-${id}`);
  if(el){ el.className='cval '+(it.stock===0?'c-zero':it.stock<=(it.minS||1)?'c-low':'c-ok'); el.textContent=it.stock; }
  const card=document.getElementById(`card-${id}`);
  if(card) card.classList.toggle('low-stock',it.stock<=(it.minS||1));
  document.getElementById('total-stock').textContent=S.items.reduce((a,i)=>a+(i.stock||0),0);
  if(it.stock===0){
    toast(`⚠️ ${it.name} — Stock épuisé !`);
    sendNotification(`⚠️ Stock épuisé`, `${it.name} n'est plus en stock !`);
  } else if(it.stock<=(it.minS||1)){
    toast(`🟡 ${it.name} — Stock bas`);
    sendNotification(`🟡 Stock bas`, `${it.name} — il en reste seulement ${it.stock}`);
  }
}

async function sendNotification(title, body) {
  try {
    const { LocalNotifications } = Capacitor.Plugins;
    if(!LocalNotifications) return;
    const perm = await LocalNotifications.requestPermissions();
    if(perm.display !== 'granted') return;
    await LocalNotifications.schedule({
      notifications: [{
        title: title,
        body: body,
        id: Math.floor(Math.random() * 100000),
        schedule: { at: new Date(Date.now() + 500) },
        sound: null,
        attachments: null,
        actionTypeId: '',
        extra: null
      }]
    });
  } catch(e) { console.log('Notification error:', e); }
}

function useIt(id){ chgStock(id,-1); toast('✅ Article utilisé'); }

function editItem(id) {
  const it=S.items.find(i=>i.id===id); if(!it) return;
  editId=id; currentPhoto=it.photo||null; modalAccs=[...(it.accessories||[])];
  document.getElementById('m-title').textContent='Modifier';
  document.getElementById('f-name').value=it.name;
  document.getElementById('name-dropdown').style.display='none';
  document.getElementById('f-desc').value=it.desc||'';
  document.getElementById('f-stock').value=it.stock;
  document.getElementById('f-min').value=it.minS||1;
  const fl=document.getElementById('f-longueur'); if(fl) fl.value=it.longueur||'';

function nextEmptySlot(){ return currentPhotos.findIndex(p=>p===null); }

function compressPhoto(dataUrl, callback) {
  const img = new Image();
  img.onload = function() {
    const MAX = 800;
    let w = img.width, h = img.height;
    if (w > MAX || h > MAX) {
      if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
      else { w = Math.round(w * MAX / h); h = MAX; }
    }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    callback(canvas.toDataURL('image/jpeg', 0.6));
  };
  img.src = dataUrl;
}

function handlePhotoCamera(e){
  const slot = nextEmptySlot();
  if(slot<0){ toast('⚠️ 4 photos maximum !'); return; }
  handlePhotoSlot(e, slot);
}

// CROP
// ══════════════════════════════════════════════
let cropSlot = null;
let cropImg = new Image();
let cropState = { x:0, y:0, zoom:100, rot:0 };
let cropDrag = { active:false, lastX:0, lastY:0 };

function handlePhotoSlot(e, slot) {
  const f=e.target.files&&e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{ openCropModal(ev.target.result, slot); };
  r.readAsDataURL(f);
  e.target.value='';
}

function openCropModal(src, slot) {
  cropSlot = slot;
  cropState = { x:0, y:0, zoom:100, rot:0 };
  document.getElementById('crop-zoom').value = 100;
  document.getElementById('crop-rot').value = 0;
  document.getElementById('crop-zoom-val').textContent = '100%';
  document.getElementById('crop-rot-val').textContent = '0°';
  document.getElementById('crop-modal').style.display = 'flex';

  cropImg = new Image();
  cropImg.onload = () => {
    const container = document.getElementById('crop-container');
    const cW = container.offsetWidth;
    const cH = container.offsetHeight;
    const scaleW = cW / cropImg.width;
    const scaleH = cH / cropImg.height;
    const initZoom = Math.max(scaleW, scaleH) * 100;
    cropState.zoom = Math.round(initZoom);
    document.getElementById('crop-zoom').value = cropState.zoom;
    document.getElementById('crop-zoom-val').textContent = cropState.zoom + '%';
    drawCrop();
  };
  cropImg.src = src;

  const container = document.getElementById('crop-container');
  container.ontouchstart = e2 => {
    if(e2.touches.length===1){ e2.preventDefault(); cropDrag.active=true; cropDrag.lastX=e2.touches[0].clientX; cropDrag.lastY=e2.touches[0].clientY; }
  };
  container.ontouchmove = e2 => {
    if(!cropDrag.active||e2.touches.length!==1) return;
    e2.preventDefault();
    cropState.x += e2.touches[0].clientX - cropDrag.lastX;
    cropState.y += e2.touches[0].clientY - cropDrag.lastY;
    cropDrag.lastX = e2.touches[0].clientX;
    cropDrag.lastY = e2.touches[0].clientY;
    drawCrop();
  };
  container.ontouchend = () => { cropDrag.active=false; };
  container.onmousedown = e2 => { cropDrag.active=true; cropDrag.lastX=e2.clientX; cropDrag.lastY=e2.clientY; };
  container.onmousemove = e2 => {
    if(!cropDrag.active) return;
    cropState.x += e2.clientX - cropDrag.lastX;
    cropState.y += e2.clientY - cropDrag.lastY;
    cropDrag.lastX = e2.clientX; cropDrag.lastY = e2.clientY;
    drawCrop();
  };
  container.onmouseup = () => { cropDrag.active=false; };
}

function drawCrop() {
  const container = document.getElementById('crop-container');
  const canvas = document.getElementById('crop-canvas');
  const cW = container.offsetWidth;
  const cH = container.offsetHeight;
  canvas.width = cW; canvas.height = cH;
  const ctx = canvas.getContext('2d');
  cropState.zoom = parseInt(document.getElementById('crop-zoom').value);
  cropState.rot  = parseInt(document.getElementById('crop-rot').value);
  document.getElementById('crop-zoom-val').textContent = cropState.zoom + '%';
  document.getElementById('crop-rot-val').textContent  = cropState.rot + '°';
  ctx.clearRect(0,0,cW,cH);
  ctx.save();
  ctx.translate(cW/2 + cropState.x, cH/2 + cropState.y);
  ctx.rotate(cropState.rot * Math.PI/180);
  ctx.scale(cropState.zoom/100, cropState.zoom/100);
  ctx.drawImage(cropImg, -cropImg.width/2, -cropImg.height/2);
  ctx.restore();
}

function cropReset() {
  const container = document.getElementById('crop-container');
  const cW = container.offsetWidth; const cH = container.offsetHeight;
  const scaleW = cW / cropImg.width; const scaleH = cH / cropImg.height;
  cropState = { x:0, y:0, zoom:Math.round(Math.max(scaleW, scaleH)*100), rot:0 };
  document.getElementById('crop-zoom').value = cropState.zoom;
  document.getElementById('crop-rot').value = 0;
  drawCrop();
}

function closeCropModal() { document.getElementById('crop-modal').style.display='none'; }

function confirmCrop() {
  const container = document.getElementById('crop-container');
  const cW = container.offsetWidth; const cH = container.offsetHeight;
  const canvas = document.createElement('canvas');
  canvas.width = cW*2; canvas.height = cH*2;
  const ctx = canvas.getContext('2d');
  ctx.scale(2,2);
  ctx.save();
  ctx.translate(cW/2 + cropState.x, cH/2 + cropState.y);
  ctx.rotate(cropState.rot * Math.PI/180);
  ctx.scale(cropState.zoom/100, cropState.zoom/100);
  ctx.drawImage(cropImg, -cropImg.width/2, -cropImg.height/2);
  ctx.restore();
  const result = canvas.toDataURL('image/jpeg', 0.88);
  compressPhoto(result, compressed => {
    currentPhotos[cropSlot] = compressed;
    updateSlotUI(cropSlot, compressed);
  });
  closeCropModal();
}

function updateSlotUI(slot, src) {
  const inner=document.getElementById(`slot-inner-${slot}`); if(!inner) return;

  } else {
    inner.innerHTML=`📷<div style="font-size:10px;color:var(--tdim);margin-top:4px;">Photo ${slot+1}</div>`;
    const slotEl=document.getElementById(`slot-${slot}`); if(slotEl) slotEl.style.borderColor='';

  }
}

function setPhotoUI(photos){
  currentPhotos=[null,null,null,null];

function exportData() {
  try {
    const data = JSON.stringify(S, null, 2);
    const date = new Date().toISOString().slice(0,10);
    const b64  = btoa(unescape(encodeURIComponent(data)));
    const a    = document.createElement('a');
    a.href     = 'data:application/json;base64,' + b64;
    a.download = `la-cave-${date}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    toast('💾 Fichier de sauvegarde téléchargé !');
  } catch(e) {
    toast('❌ Erreur export : ' + e.message);
  }
}

document.getElementById('import-input').addEventListener('change', function(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try {
      const data=JSON.parse(ev.target.result);
      if(!data.containers||!data.items){ toast('❌ Fichier invalide'); return; }
      if(confirm('Restaurer ? Les données actuelles seront remplacées.')){
        S=data;
        if(!S.achats) S.achats=[];
        persist(); render(); toast('✅ Données restaurées !');
      }
    } catch(err){ toast('❌ Erreur lecture fichier'); }
  };
  r.readAsText(f, 'UTF-8');
  e.target.value='';
});

function handleCtrSlot(e, slot) {
  const f = e.target.files && e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    compressPhoto(ev.target.result, compressed => {
      ctrPhotos[slot] = compressed;
      renderCtrSlots();
    });
  };
  r.readAsDataURL(f);
  e.target.value = '';
}

function clearCtrSlot(slot) { ctrPhotos[slot] = null; renderCtrSlots(); }
function clearAllCtrPhotos() { ctrPhotos = new Array(14).fill(null); renderCtrSlots(); }
function handleCtrPhoto(e) {}
function clearCtrPhoto() {}

function viewCtrSlot(slot) {
  const photo = ctrPhotos[slot]; if(!photo) return;
  const letters = 'ABCDEFGHIJKLMN';
  document.getElementById('im-img').src = photo;
  document.getElementById('im-name').textContent = 'Compartiment ' + letters[slot];
  document.getElementById('img-modal').classList.add('open');
}

function saveCtr() {
  const name=document.getElementById('ctr-name').value.trim(); if(!name){ toast('⚠️ Saisissez un nom'); return; }
  const photoTab=document.getElementById('ctr-photo-section').style.display!=='none';
  const finalPhotos=photoTab&&selTypeKey==='caisse'?ctrPhotos.filter(Boolean):null;
  const parentId=document.getElementById('ctr-parent').value||null;
  if(ctrEditId){
    const ct=S.containers.find(x=>x.id===ctrEditId);
    if(ct){ ct.name=name; ct.icon=selIcon; ct.type=selTypeKey; ct.parentId=parentId; ct.mainPhoto=ctrMainPhoto||null; if(finalPhotos) ct.photos=finalPhotos; else if(!photoTab) ct.photos=null; }
    toast(`✅ ${name} modifié`);
  } else {
    const id='c'+Date.now();
    S.containers.push({id,name,icon:selIcon,type:selTypeKey,mainPhoto:ctrMainPhoto||null,photos:finalPhotos,parentId});
    S.open[id]=true;
    toast(`✅ ${name} ajouté`);
  }
  persist(); ctrEditId=null; ctrPhotos=new Array(14).fill(null); ctrMainPhoto=null;
  document.getElementById('ctr-name').value='';
  document.getElementById('ctr-form-title').textContent='Ajouter';
  document.getElementById('ctr-save-btn').textContent='＋ Ajouter';
  switchCtrTab('icon'); renderCtrList(); render();
}

function fillCtrParentSelect(editId) {
  const sel = document.getElementById('ctr-parent');
  sel.innerHTML = '<option value="">— Aucun meuble parent —</option>';
  S.containers.forEach(c => {
    if(c.id === editId) return; // éviter auto-référence
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = (c.photo ? '📷' : c.icon) + ' ' + c.name;
    sel.appendChild(opt);
  });
}

function delCtr(id) {
  const c=S.containers.find(x=>x.id===id); const cnt=S.items.filter(i=>i.cid===id).length;
  if(!confirm(`Supprimer "${c?.name}"${cnt>0?` et ses ${cnt} articles`:''}?`)) return;
  // Détacher les enfants
  S.containers.forEach(c2=>{ if(c2.parentId===id) c2.parentId=null; });
  S.containers=S.containers.filter(x=>x.id!==id); S.items=S.items.filter(i=>i.cid!==id);
  persist(); renderCtrList(); render(); toast('🗑️ Supprimé');
}

function renderSchema() {
  document.getElementById('main').style.display='none';
  document.getElementById('stats-view').classList.remove('open');
  document.getElementById('achats-view').classList.remove('open');
  document.getElementById('schema-view').classList.add('open');

  let html = `<div style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--gl);margin-bottom:16px;">🗂️ Vue Schéma</div>`;

  if(!S.containers.length) {
    html += `<div class="empty"><div class="eico">🗂️</div><p>Aucune caisse ou meuble.<br>Créez-en depuis l'accueil !</p></div>`;
    document.getElementById('schema-content').innerHTML = html;
    return;
  }

  // Meubles parents = sans parentId
  const parents = S.containers.filter(c => !c.parentId);
  // Caisses orphelines sans parent explicite mais qui ne sont enfant de personne
  const tousLesEnfantsIds = S.containers.filter(c=>c.parentId).map(c=>c.id);

  function renderNode(c, level) {
    const ico = c.photo
      ? `<img src="${c.photo}" style="width:${level===0?30:24}px;height:${level===0?30:24}px;object-fit:cover;border-radius:6px;vertical-align:middle;">`
      : `<span style="font-size:${level===0?22:18}px">${c.icon}</span>`;
    const nbArts = S.items.filter(i=>i.cid===c.id).length;
    const enfants = S.containers.filter(x=>x.parentId===c.id);
    const marginLeft = level * 28;
    const borderLeft = level > 0 ? `border-left:2px solid var(--g);padding-left:12px;` : '';
    const bg = level===0 ? `background:var(--d2);border:2px solid var(--g);` : `background:var(--d3);border:1.5px solid var(--d4);`;
    const nameColor = level===0 ? `color:var(--gl);font-size:17px;` : `color:var(--tx);font-size:15px;`;

    let nodeHtml = `
    <div style="margin-left:${marginLeft}px;${borderLeft}margin-bottom:6px;">
      <div style="${bg}border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer;" onclick="schToggle('${c.id}')">
        ${ico}
        <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:1px;flex:1;${nameColor}">${c.name}</span>
        <span style="font-size:11px;color:var(--tm);background:var(--d4);padding:2px 8px;border-radius:12px;">${nbArts} art.</span>
        <span style="color:var(--g);font-size:13px;" id="chev-${c.id}">▼</span>
      </div>
      <div id="body-${c.id}">
        ${enfants.map(e => renderNode(e, level+1)).join('')}
        ${!enfants.length && nbArts===0 ? `<div style="margin-left:${marginLeft+20}px;color:var(--tdim);font-size:11px;padding:4px 0 2px;">Vide</div>` : ''}
      </div>
    </div>`;
    return nodeHtml;
  }

  parents.forEach(p => { html += renderNode(p, 0); });

  document.getElementById('schema-content').innerHTML = html;
}

function schToggle(id) {
  const body = document.getElementById('body-'+id);
  const chev = document.getElementById('chev-'+id);
  if(!body) return;
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : '';
  if(chev) chev.style.transform = isOpen ? 'rotate(-90deg)' : '';
}
